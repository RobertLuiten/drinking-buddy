<!DOCTYPE html>
<html>
<head>
  <title>Drinking Buddy Manager</title>
  <script src="https://cdn.jsdelivr.net/gh/RobotWebTools/roslibjs/build/roslib.min.js"></script>

  <style>
    body { font-family: sans-serif; padding: 20px; }
    .pose-card {
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
      background: #f7f7f7;
    }
    .pose-card:hover {
      background: #eaeaea;
    }
  </style>
</head>
<body>
  <h1>Drinking (Drinky?) Buddy (Buddies?)</h1>
  <h2>Status</h2>
  <h2>Actions</h2>
  <button onclick="startRobot">Start</button>
  <button onclick="resetPosition">Reset</button>
  <h2>Current Status</h2>
  <div id="currentStateList"></div>
  <h2>Map</h2>
  <img id="navigation_map" name="navigation_map" style="width: 100%" 
  src="placeholder.jpg" alt="Navigation Map" onclick="clickNavigationMap(event);" 
  draggable="false"/>
  <ol id="navigation_list"></ol>
  <script src="ui_control.js"></script>
</body>
</html>
