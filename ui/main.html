<!DOCTYPE html>
<html>
<head>
  <title>Drinking Buddy Manager</title>
  <script src="https://cdn.jsdelivr.net/gh/RobotWebTools/roslibjs/build/roslib.min.js"></script>

  <link rel="stylesheet" type="text/css" href="csharp.css">
</head>
<body>
  <h1>Drinking (Drinky?) Buddy (Buddies?)</h1>
  <h2>Status</h2>
  <h2>Actions</h2>
  <button onclick="startRobot">Start</button>
  <button onclick="resetPosition">Reset</button>
  <h2>Current Status</h2>
  <div id="currentStateList"></div>
  <h2>Map</h2>
  <div id="navigation_map" name="navigation_map"
  style="background: url('placeholder.jpg'); width:100%; height:100%;" alt="Navigation Map" onclick="clickNavigationMap(event);" 
  draggable="false">
    <img src="white_dot.png" style="visibility: hidden;" draggable="false" class="noselect" id="click_dot"/>
  </div>  
  <ol id="navigation_list"></ol>
  <script src="ui_control.js"></script>
</body>
</html>
